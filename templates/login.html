<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - AI 模型对比</title>
    <style>
        :root {
            --bg-color: #ffffff;
            --text-primary: #1d1d1f;
            --text-secondary: #86868b;
            --accent-color: #0071e3;
            --accent-hover: #0077ed;
            --border-color: #d2d2d7;
            --divider-color: #e8e8ed;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: var(--bg-color);
            color: var(--text-primary);
            line-height: 1.47059;
            font-weight: 400;
            letter-spacing: -0.022em;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 22px;
        }
        .login-box {
            width: 100%;
            max-width: 400px;
            padding: 40px;
        }
        .logo {
            font-size: 48px;
            text-align: center;
            margin-bottom: 24px;
        }
        h1 {
            text-align: center;
            font-size: 40px;
            line-height: 1.1;
            font-weight: 600;
            letter-spacing: -0.005em;
            margin-bottom: 12px;
        }
        .subtitle {
            text-align: center;
            font-size: 17px;
            line-height: 1.47059;
            color: var(--text-secondary);
            margin-bottom: 40px;
        }
        .input-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            color: var(--text-primary);
            text-transform: uppercase;
            letter-spacing: 0.08em;
            margin-bottom: 8px;
        }
        input {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid var(--border-color);
            border-radius: 12px;
            font-size: 17px;
            line-height: 1.47059;
            transition: border-color 0.2s, box-shadow 0.2s;
            background: #fafafa;
        }
        input:focus {
            outline: none;
            border-color: var(--accent-color);
            box-shadow: 0 0 0 4px rgba(0,113,227,0.1);
            background: #fff;
        }
        .btn-group {
            display: flex;
            gap: 12px;
            margin-top: 24px;
        }
        .btn {
            flex: 1;
            padding: 12px 24px;
            background: var(--accent-color);
            color: #fff;
            border: none;
            border-radius: 980px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.2s;
        }
        .btn:hover {
            background: var(--accent-hover);
        }
        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .btn-secondary {
            background: #f5f5f7;
            color: var(--text-primary);
        }
        .btn-secondary:hover {
            background: #e8e8ed;
        }
        .limit-info {
            text-align: center;
            font-size: 12px;
            color: var(--text-secondary);
            margin-top: 24px;
        }
        .error-msg {
            background: #fff2f2;
            color: #d70015;
            padding: 12px 16px;
            border-radius: 12px;
            margin-bottom: 20px;
            font-size: 14px;
            display: none;
        }
        .success-msg {
            background: #f0fdf4;
            color: #16a34a;
            padding: 12px 16px;
            border-radius: 12px;
            margin-bottom: 20px;
            font-size: 14px;
            display: none;
        }
    </style>
</head>
<body>
    <div class="login-box">
        <div class="logo">🦞</div>
        <h1>欢迎</h1>
        <p class="subtitle">AI 模型对比对话窗口</p>
        
        <div id="errorMsg" class="error-msg"></div>
        <div id="successMsg" class="success-msg"></div>
        
        <form onsubmit="handle(event)">
            <div class="input-group">
                <label for="username">用户名</label>
                <input type="text" id="username" placeholder="输入用户名" required autofocus>
            </div>
            <div class="btn-group">
                <button type="submit" id="loginBtn" class="btn">登录</button>
                <button type="button" id="registerBtn" class="btn btn-secondary" onclick="register()">注册</button>
            </div>
            <div class="limit-info">最多允许 10 个用户注册</div>
        </form>
    </div>

    <script>
        async function handle(event) {
            event.preventDefault();
            await login();
        }
        
        function showError(msg) {
            const el = document.getElementById('errorMsg');
            el.textContent = msg;
            el.style.display = 'block';
            setTimeout(() => el.style.display = 'none', 3000);
        }
        
        function showSuccess(msg) {
            const el = document.getElementById('successMsg');
            el.textContent = msg;
            el.style.display = 'block';
            setTimeout(() => {
                el.style.display = 'none';
                window.location.href = '/';
            }, 1000);
        }
        
        async function login() {
            const username = document.getElementById('username').value.trim();
            if (!username) return;
            
            const btn = document.getElementById('loginBtn');
            btn.disabled = true;
            btn.textContent = '登录中...';
            
            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, action: 'login' })
                });
                
                const data = await response.json();
                
                if (response.ok && data.success) {
                    window.location.href = '/';
                } else {
                    if (data.error === "用户不存在，请先注册") {
                        showError('用户不存在，请先注册');
                        document.getElementById('registerBtn').focus();
                    } else {
                        showError(data.error || '登录失败');
                    }
                    btn.disabled = false;
                    btn.textContent = '登录';
                }
            } catch (error) {
                showError('网络错误：' + error.message);
                btn.disabled = false;
                btn.textContent = '登录';
            }
        }
        
        async function register() {
            const username = document.getElementById('username').value.trim();
            if (!username) {
                showError('请输入用户名');
                return;
            }
            
            const btn = document.getElementById('registerBtn');
            btn.disabled = true;
            btn.textContent = '注册中...';
            
            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, action: 'register' })
                });
                
                const data = await response.json();
                
                if (response.ok && data.success) {
                    showSuccess('✓ 注册成功');
                } else {
                    showError(data.error || '注册失败');
                    btn.disabled = false;
                    btn.textContent = '注册';
                }
            } catch (error) {
                showError('网络错误：' + error.message);
                btn.disabled = false;
                btn.textContent = '注册';
            }
        }
    </script>
</body>
</html>
