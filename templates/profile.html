<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>个人主页 - AI 模型对比</title>
    <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
    <style>
        :root {
            --bg-color: #ffffff;
            --text-primary: #1d1d1f;
            --text-secondary: #86868b;
            --accent-color: #0071e3;
            --border-color: #d2d2d7;
            --divider-color: #e8e8ed;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: var(--bg-color);
            color: var(--text-primary);
        }
        .header {
            background: rgba(255,255,255,0.8);
            backdrop-filter: saturate(180%) blur(20px);
            border-bottom: 1px solid var(--divider-color);
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .header-content {
            max-width: 980px;
            margin: 0 auto;
            padding: 0 22px;
            height: 52px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .nav-links a {
            color: var(--accent-color);
            text-decoration: none;
            padding: 8px 16px;
            border-radius: 980px;
            font-size: 12px;
            transition: background 0.2s;
        }
        .nav-links a:hover { background: #f5f5f7; }
        .main { max-width: 980px; margin: 0 auto; padding: 40px 22px 80px; }
        
        .profile-header {
            display: flex;
            gap: 32px;
            align-items: flex-start;
            margin-bottom: 40px;
            padding: 32px;
            background: #fafafa;
            border-radius: 16px;
        }
        .avatar {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            flex-shrink: 0;
        }
        .profile-info h1 {
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 8px;
        }
        .username {
            font-size: 18px;
            color: var(--text-secondary);
            margin-bottom: 16px;
        }
        .bio {
            font-size: 15px;
            color: var(--text-primary);
            line-height: 1.6;
        }
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }
        .stat-card {
            padding: 24px;
            background: white;
            border-radius: 12px;
            border: 1px solid var(--divider-color);
        }
        .stat-value {
            font-size: 32px;
            font-weight: 700;
            color: var(--accent-color);
            margin-bottom: 8px;
        }
        .stat-label {
            font-size: 14px;
            color: var(--text-secondary);
        }
        .edit-section {
            padding: 32px;
            background: white;
            border-radius: 16px;
            border: 1px solid var(--divider-color);
        }
        .edit-section h2 {
            font-size: 24px;
            margin-bottom: 24px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            color: var(--text-primary);
            text-transform: uppercase;
            letter-spacing: 0.08em;
            margin-bottom: 8px;
        }
        input, textarea {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid var(--border-color);
            border-radius: 12px;
            font-size: 15px;
            font-family: inherit;
        }
        input:focus, textarea:focus {
            outline: none;
            border-color: var(--accent-color);
            box-shadow: 0 0 0 4px rgba(0,113,227,0.1);
        }
        textarea { resize: vertical; min-height: 100px; }
        .btn {
            padding: 12px 24px;
            background: var(--accent-color);
            color: white;
            border: none;
            border-radius: 980px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.2s;
        }
        .btn:hover { background: #0077ed; }
    </style>
</head>
<body>
    <header class="header">
        <div class="header-content">
            <h1>个人主页</h1>
            <nav class="nav-links">
                <a href="/">对话</a>
                <a href="/settings">设置</a>
                <a href="#" onclick="logout()">退出</a>
            </nav>
        </div>
    </header>

    <main class="main">
        <div class="profile-header">
            <img id="avatar" class="avatar" alt="头像">
            <div class="profile-info">
                <h1 id="displayName"></h1>
                <div class="username" id="username"></div>
                <div class="bio" id="bio"></div>
            </div>
        </div>

        <div class="stats">
            <div class="stat-card">
                <div class="stat-value" id="msgCount">-</div>
                <div class="stat-label">发送消息数</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="configCount">-</div>
                <div class="stat-label">配置的模型</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="daysCount">-</div>
                <div class="stat-label">注册天数</div>
            </div>
        </div>

        <div class="edit-section">
            <h2>编辑资料</h2>
            <form onsubmit="saveProfile(event)">
                <div class="form-group">
                    <label>邮箱</label>
                    <input type="email" id="email" placeholder="your@email.com">
                </div>
                <div class="form-group">
                    <label>个性签名</label>
                    <textarea id="bioEdit" placeholder="介绍一下自己..."></textarea>
                </div>
                <button type="submit" class="btn">保存修改</button>
            </form>
        </div>
    </main>

    <script>
        let currentUser = null;
        
        // 生成 GitHub 风格头像
        function generateAvatar(seed, size = 120) {
            const canvas = document.createElement('canvas');
            canvas.width = size;
            canvas.height = size;
            const ctx = canvas.getContext('2d');
            
            // 基于种子生成颜色
            let hash = 0;
            for (let i = 0; i < seed.length; i++) {
                hash = seed.charCodeAt(i) + ((hash << 5) - hash);
            }
            const hue = hash % 360;
            const color = `hsl(${hue}, 60%, 50%)`;
            const bgColor = `hsl(${hue}, 60%, 95%)`;
            
            // 背景
            ctx.fillStyle = bgColor;
            ctx.fillRect(0, 0, size, size);
            
            // 生成马赛克方块
            const blockSize = size / 8;
            ctx.fillStyle = color;
            
            for (let i = 0; i < 8; i++) {
                for (let j = 0; j < 8; j++) {
                    // 对称生成
                    if ((hash >> (i * 8 + j)) & 1) {
                        ctx.fillRect(i * blockSize, j * blockSize, blockSize, blockSize);
                        ctx.fillRect((7 - i) * blockSize, j * blockSize, blockSize, blockSize);
                    }
                }
            }
            
            return canvas.toDataURL();
        }
        
        async function init() {
            try {
                const resp = await fetch('/api/me');
                const data = await resp.json();
                if (!data.authenticated) {
                    window.location.href = '/login';
                    return;
                }
                currentUser = data.user;
                loadProfile();
            } catch (error) {
                window.location.href = '/login';
            }
        }
        
        async function loadProfile() {
            const resp = await fetch(`/api/users/${currentUser.id}`);
            const user = await resp.json();
            
            document.getElementById('displayName').textContent = user.username;
            document.getElementById('username').textContent = `@${user.username}`;
            document.getElementById('bio').textContent = user.bio || '暂无签名';
            document.getElementById('avatar').src = generateAvatar(user.avatar_seed || user.username);
            document.getElementById('email').value = user.email || '';
            document.getElementById('bioEdit').value = user.bio || '';
            
            // 加载统计
            document.getElementById('msgCount').textContent = '0'; // TODO: 从后端获取
            document.getElementById('configCount').textContent = '0';
            
            const createdDate = new Date(user.created_at);
            const days = Math.floor((new Date() - createdDate) / (1000 * 60 * 60 * 24));
            document.getElementById('daysCount').textContent = days;
        }
        
        async function saveProfile(event) {
            event.preventDefault();
            
            const email = document.getElementById('email').value;
            const bio = document.getElementById('bioEdit').value;
            
            try {
                const resp = await fetch('/api/profile', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, bio })
                });
                
                if (resp.ok) {
                    alert('✓ 保存成功');
                    loadProfile();
                } else {
                    const data = await resp.json();
                    alert(data.detail || '保存失败');
                }
            } catch (error) {
                alert('保存失败：' + error.message);
            }
        }
        
        async function logout() {
            await fetch('/api/logout', { method: 'POST' });
            window.location.href = '/login';
        }
        
        init();
    </script>
</body>
</html>
