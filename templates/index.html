<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 模型对比</title>
    <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        .content { margin: 0; padding: 0; }
        .content > *:first-child { margin-top: 0 !important; }
        .content > *:last-child { margin-bottom: 0 !important; }
        .content h1, .content h2, .content h3 { margin: 4px 0 2px 0 !important; font-weight: 600; font-size: 1em; }
        .content p { margin: 0 0 4px 0 !important; }
        .content code { background: #f5f5f7; padding: 2px 6px; border-radius: 4px; font-size: 0.9em; }
        .content pre { background: #f5f5f7; padding: 12px; border-radius: 8px; overflow-x: auto; margin: 4px 0 !important; }
        .content pre code { background: none; padding: 0; }
        .content ul, .content ol { margin: 0 0 4px 20px !important; padding: 0; }
        .content blockquote { border-left: 3px solid var(--border-color); padding-left: 12px; margin: 4px 0 !important; color: var(--text-secondary); }
        .content a { color: var(--accent-color); text-decoration: none; }
        .content a:hover { text-decoration: underline; }
        .content table { border-collapse: collapse; width: 100%; margin: 4px 0 !important; }
        .content th, .content td { border: 1px solid var(--border-color); padding: 8px; text-align: left; }
        .content th { background: #f5f5f7; font-weight: 600; }
        .content.collapsed { max-height: 6em; overflow: hidden; }
        
        .model-response { margin-bottom: 16px; }
    </style>
    <style>
        :root {
            --bg-color: #ffffff;
            --text-primary: #1d1d1f;
            --text-secondary: #86868b;
            --accent-color: #0071e3;
            --accent-hover: #0077ed;
            --border-color: #d2d2d7;
            --divider-color: #e8e8ed;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: var(--bg-color);
            color: var(--text-primary);
            line-height: 1.47059;
            font-weight: 400;
            letter-spacing: -0.022em;
        }
        .header {
            background: rgba(255,255,255,0.8);
            backdrop-filter: saturate(180%) blur(20px);
            border-bottom: 1px solid var(--divider-color);
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .header-content {
            max-width: 980px;
            margin: 0 auto;
            padding: 0 22px;
            height: 52px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .header h1 {
            font-size: 21px;
            font-weight: 600;
            color: var(--text-primary);
        }
        .user-menu {
            position: relative;
        }
        .user-button {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 4px;
            background: #f5f5f7;
            border-radius: 50%;
            cursor: pointer;
            transition: background 0.2s;
            border: none;
        }
        .user-button:hover {
            background: #e8e8ed;
        }
        .user-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
        }
        .user-button:hover {
            background: #e8e8ed;
        }
        .user-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: block;
        }
        .dropdown {
            position: absolute;
            top: calc(100% + 8px);
            right: 0;
            background: white;
            border-radius: 12px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.12);
            border: 1px solid var(--divider-color);
            min-width: 180px;
            padding: 8px;
            display: none;
            z-index: 1000;
        }
        .dropdown.show {
            display: block;
        }
        .dropdown-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 14px;
            color: var(--text-primary);
            text-decoration: none;
            border-radius: 8px;
            font-size: 14px;
            transition: background 0.2s;
            cursor: pointer;
            border: none;
            background: none;
            width: 100%;
            text-align: left;
        }
        .dropdown-item:hover {
            background: #f5f5f7;
        }
        .dropdown-divider {
            height: 1px;
            background: var(--divider-color);
            margin: 8px 0;
        }
        .main {
            max-width: 980px;
            margin: 0 auto;
            padding: 24px 22px 140px;  /* 底部留出输入框空间，减少顶部空白 */
        }
        .chat-section {
            margin-bottom: 24px;  /* 减少间距 */
        }
        /* 固定底部输入框 */
        .input-area-fixed {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            width: calc(100% - 44px);
            max-width: 936px;
            z-index: 1000;
        }
        .input-area-fixed .input-area {
            background: white;
            border: 1px solid var(--divider-color);
            border-radius: 16px;
            padding: 8px;
            display: flex;
            align-items: flex-end;
            gap: 8px;
            transition: border-color 0.2s, box-shadow 0.2s;
            box-shadow: 0 4px 24px rgba(0,0,0,0.1);
        }
        .input-area-fixed .input-area:focus-within {
            border-color: var(--accent-color);
            box-shadow: 0 4px 24px rgba(0,113,227,0.15);
        }
        .models-selector {
            display: flex;
            gap: 12px;
            margin-bottom: 24px;
            flex-wrap: wrap;
        }
        .model-checkbox {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 14px;
            background: #f5f5f7;
            border-radius: 980px;
            font-size: 14px;
            color: var(--text-primary);
            cursor: pointer;
            transition: background 0.2s;
        }
        .model-checkbox:hover {
            background: #e8e8ed;
        }
        .model-checkbox input {
            accent-color: var(--accent-color);
        }
        .input-area {
            display: flex;
            align-items: flex-end;
            gap: 8px;
            margin-bottom: 24px;
            background: white;
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 8px;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        .input-area:focus-within {
            border-color: var(--accent-color);
            box-shadow: 0 0 0 4px rgba(0,113,227,0.1);
        }
        textarea {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 12px;
            font-size: 15px;
            line-height: 1.47059;
            resize: none;
            min-height: 40px;
            max-height: 200px;
            font-family: inherit;
            background: transparent;
        }
        textarea:focus {
            outline: none;
        }
        .send-btn {
            width: 40px;
            height: 40px;
            background: #1d1d1f;
            color: white;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: background 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }
        .send-btn:hover {
            background: #000;
        }
        .send-btn:disabled {
            background: var(--border-color);
            cursor: not-allowed;
        }
        .send-btn svg {
            width: 20px;
            height: 20px;
        }
        .response-area {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 24px;
        }
        .model-response {
            background: #fafafa;
            border-radius: 12px;
            padding: 16px;  /* 减少内边距 */
            border: 1px solid var(--divider-color);
            margin-bottom: 12px;  /* 减少间距 */
        }
        .model-response.error {
            border-color: #ffcccc;
            background: #fff2f2;
        }
        .model-name {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 8px;  /* 减少间距 */
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .latency {
            font-size: 12px;
            color: var(--text-secondary);
            font-weight: 400;
        }
        .content {
            line-height: 1.7;
            color: var(--text-primary);
            white-space: pre-wrap;
            font-size: 15px;
        }
        .error-detail {
            margin-top: 10px;
            padding: 10px;
            background: #fff;
            border: 1px solid #ffcccc;
            border-radius: 6px;
            font-size: 12px;
            font-family: monospace;
            color: #d70015;
            white-space: pre-wrap;
            word-break: break-all;
        }
        .show-error-btn {
            margin-top: 8px;
            padding: 6px 12px;
            background: #d70015;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 12px;
            cursor: pointer;
        }
        .show-error-btn:hover {
            background: #b00012;
        }
        .loading {
            text-align: center;
            padding: 48px 24px;
            color: var(--text-secondary);
        }
        .spinner {
            border: 3px solid var(--divider-color);
            border-top-color: var(--accent-color);
            border-radius: 50%;
            width: 32px;
            height: 32px;
            animation: spin 1s linear infinite;
            margin: 0 auto 16px;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="header-content">
            <h1>AI 模型对比</h1>
            <div class="user-menu">
                <button class="user-button" onclick="toggleDropdown()" title="用户菜单">
                    <img id="userAvatar" class="user-avatar" alt="头像">
                </button>
                <div id="userDropdown" class="dropdown">
                    <div style="padding: 12px 14px; border-bottom: 1px solid var(--divider-color);">
                        <div style="font-weight: 600; font-size: 14px;" id="username">加载中...</div>
                        <div style="font-size: 12px; color: var(--text-secondary);" id="userRole">用户</div>
                    </div>
                    <a href="/profile" class="dropdown-item">
                        <span>👤</span> 个人主页
                    </a>
                    <a href="/settings" class="dropdown-item">
                        <span>⚙️</span> 设置
                    </a>
                    <a href="/files" class="dropdown-item">
                        <span>📁</span> 文件下载
                    </a>
                    <div class="dropdown-divider"></div>
                    <button onclick="logout()" class="dropdown-item">
                        <span>🚪</span> 退出
                    </button>
                </div>
            </div>
        </div>
    </header>

    <main class="main">
        <!-- 会话列表 -->
        <div id="sessionList" style="margin-bottom: 24px;"></div>
        
        <section class="chat-section">
            <div class="models-selector">
                <label class="model-checkbox">
                    <input type="checkbox" value="tencent" checked> 腾讯云
                </label>
                <label class="model-checkbox">
                    <input type="checkbox" value="aliyun" checked> 阿里云
                </label>
                <button onclick="newSession()" style="margin-left: auto; padding: 6px 14px; background: var(--accent-color); color: white; border: none; border-radius: 980px; font-size: 13px; cursor: pointer;">+ 新对话</button>
            </div>
        </section>
        
        <div id="responseArea" class="response-area"></div>
    </main>
    
    <!-- 固定底部输入框 -->
    <div class="input-area-fixed">
        <div class="input-area">
            <textarea id="userMessage" placeholder="输入你的问题..." rows="1" onkeydown="handleKeydown(event)"></textarea>
            <button id="sendBtn" class="send-btn" onclick="send()" title="发送">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M12 19V5M5 12l7-7 7 7"/>
                </svg>
            </button>
        </div>
    </div>

    <script>
        let sessionId = localStorage.getItem('sessionId') || null;
        let currentUser = null;
        let conversationHistory = [];  // 多轮对话历史
        let sessions = [];  // 会话列表
        
        // 加载会话列表
        async function loadSessions() {
            try {
                const resp = await fetch('/api/sessions');
                const data = await resp.json();
                sessions = data.sessions || [];
                
                const sessionList = document.getElementById('sessionList');
                if (sessions.length === 0) {
                    sessionList.innerHTML = '';
                    return;
                }
                
                const html = `
                    <div style="margin-bottom: 16px;">
                        <h3 style="font-size: 14px; font-weight: 600; color: var(--text-secondary); margin-bottom: 12px;">对话历史</h3>
                        <div style="display: flex; flex-wrap: wrap; gap: 8px;">
                            ${sessions.map(s => `
                                <div style="display: flex; align-items: center; gap: 4px; padding: 6px 12px; background: ${s.session_id === sessionId ? 'var(--accent-color)' : '#f5f5f7'}; border-radius: 980px;">
                                    <button onclick="switchSession('${s.session_id}')" 
                                        style="background: none; border: none; color: ${s.session_id === sessionId ? 'white' : 'var(--text-primary)'}; font-size: 13px; cursor: pointer; padding: 2px 4px;">
                                        💬 ${s.title || `第${s.round_count}轮`}
                                    </button>
                                    <button onclick="editSessionTitle('${s.session_id}', '${s.title || ''}')" 
                                        style="background: none; border: none; color: ${s.session_id === sessionId ? 'rgba(255,255,255,0.8)' : 'var(--text-secondary)'}; font-size: 12px; cursor: pointer; padding: 2px;">
                                        ✏️
                                    </button>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                `;
                sessionList.innerHTML = html;
            } catch (error) {
                console.error('加载会话列表失败:', error);
            }
        }
        
        function switchSession(newSessionId) {
            sessionId = newSessionId;
            localStorage.setItem('sessionId', sessionId);
            conversationHistory = [];
            document.getElementById('responseArea').innerHTML = '';
            loadHistory();
            loadSessions();
        }
        
        function newSession() {
            sessionId = uuidv4();
            localStorage.setItem('sessionId', sessionId);
            conversationHistory = [];
            document.getElementById('responseArea').innerHTML = '';
            loadSessions();
        }
        
        async function editSessionTitle(sessionId, currentTitle) {
            const newTitle = prompt('输入对话标题（留空使用默认）：', currentTitle);
            if (newTitle === null) return;  // 取消
            
            try {
                const resp = await fetch(`/api/sessions/${sessionId}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ title: newTitle || null })
                });
                
                if (resp.ok) {
                    // 更新本地会话列表
                    const session = sessions.find(s => s.session_id === sessionId);
                    if (session) {
                        session.title = newTitle || null;
                    }
                    loadSessions();
                }
            } catch (error) {
                alert('修改失败：' + error.message);
            }
        }
        
        function uuidv4() {
            return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, function(c) {
                const r = Math.random() * 16 | 0;
                const v = c === 'x' ? r : (r & 0x3 | 0x8);
                return v.toString(16);
            });
        }
        
        // 加载历史记录
        async function loadHistory() {
            if (!sessionId) return;
            
            try {
                const resp = await fetch(`/api/history?session_id=${sessionId}&limit=50`);
                const data = await resp.json();
                
                if (data.history && data.history.length > 0) {
                    // 重建对话历史用于上下文
                    data.history.forEach(round => {
                        conversationHistory.push({ role: "user", content: round.user_message });
                        if (round.model_responses) {
                            round.model_responses.forEach(resp => {
                                if (resp.success) {
                                    conversationHistory.push({ role: "assistant", content: resp.content });
                                }
                            });
                        }
                    });
                    
                    // 渲染历史对话
                    renderHistory(data.history);
                }
            } catch (error) {
                console.error('加载历史记录失败:', error);
            }
        }
        
        function renderHistory(history) {
            const responseArea = document.getElementById('responseArea');
            responseArea.innerHTML = '';
            
            history.forEach(round => {
                const html = renderRound(round);
                responseArea.innerHTML += html;
            });
            
            // 滚动到底部
            window.scrollTo(0, document.body.scrollHeight);
        }
        
        function renderRound(round) {
            const isAdmin = currentUser && currentUser.username === 'cirrus';
            
            if (!round.model_responses || round.model_responses.length === 0) {
                return '';
            }
            
            const html = round.model_responses.map((resp, index) => {
                const isError = !resp.success || resp.error_message;
                const content = resp.success ? marked.parse(resp.content) : ('❌ ' + resp.error_message);
                const shouldFold = resp.content && resp.content.length > 100;  // 超过 100 字折叠
                const uniqueId = `content-${round.round}-${index}`;
                
                const errorDetail = isAdmin && isError ? `
                    <button class="show-error-btn" onclick="this.nextElementSibling.style.display='block'">查看详细错误</button>
                    <div class="error-detail" style="display:none">${resp.error_message || '未知错误'}</div>
                ` : '';
                
                return `
                    <div class="model-response ${isError ? 'error' : ''}">
                        <div class="model-name" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; font-size: 13px; font-weight: 500;">
                            <span>${resp.model === 'tencent' ? '腾讯云' : '阿里云'} ${resp.model_id ? `(${resp.model_id})` : ''}</span>
                            <span class="latency" style="font-size: 12px; color: var(--text-secondary); font-weight: 400;">${resp.latency_ms || 0}ms</span>
                        </div>
                        <div class="content ${shouldFold ? 'collapsed' : ''}" id="${uniqueId}" style="${shouldFold ? 'max-height: 6em; overflow: hidden;' : ''}; line-height: 1.5; position: relative;">
                            ${content}
                            ${shouldFold ? `<div style="position: absolute; bottom: 0; left: 0; right: 0; height: 3em; background: linear-gradient(transparent, white);"></div>` : ''}
                            ${shouldFold ? `<button onclick="toggleContent('${uniqueId}', this)" style="position: absolute; bottom: 8px; right: 8px; padding: 4px 12px; background: var(--accent-color); color: white; border: none; border-radius: 6px; font-size: 12px; cursor: pointer; z-index: 10;">展开</button>` : ''}
                        </div>
                        ${errorDetail}
                    </div>
                `;
            }).join('');
            
            return `
                <div style="margin-bottom: 24px;">
                    <div style="padding: 12px 16px; background: #f5f5f7; border-radius: 12px; margin-bottom: 12px;">
                        <div style="font-size: 12px; color: var(--text-secondary); margin-bottom: 4px;">第 ${round.round} 轮 · 提问</div>
                        <div style="font-size: 15px; color: var(--text-primary); line-height: 1.6;">${round.user_message}</div>
                    </div>
                    ${html}
                </div>
            `;
        }
        
        function toggleContent(contentId, btn) {
            const content = document.getElementById(contentId);
            const isCollapsed = content.classList.contains('collapsed');
            
            if (isCollapsed) {
                // 展开
                content.classList.remove('collapsed');
                content.style.maxHeight = 'none';
                content.style.overflow = 'visible';
                btn.textContent = '收起';
            } else {
                // 收起
                content.classList.add('collapsed');
                content.style.maxHeight = '6em';
                content.style.overflow = 'hidden';
                btn.textContent = '展开';
            }
        }
        
        // 生成头像
        function generateAvatar(seed, size = 24) {
            const canvas = document.createElement('canvas');
            canvas.width = size;
            canvas.height = size;
            const ctx = canvas.getContext('2d');
            
            let hash = 0;
            for (let i = 0; i < seed.length; i++) {
                hash = seed.charCodeAt(i) + ((hash << 5) - hash);
            }
            const hue = hash % 360;
            const color = `hsl(${hue}, 60%, 50%)`;
            const bgColor = `hsl(${hue}, 60%, 95%)`;
            
            ctx.fillStyle = bgColor;
            ctx.fillRect(0, 0, size, size);
            
            const blockSize = size / 8;
            ctx.fillStyle = color;
            
            for (let i = 0; i < 8; i++) {
                for (let j = 0; j < 8; j++) {
                    if ((hash >> (i * 8 + j)) & 1) {
                        ctx.fillRect(i * blockSize, j * blockSize, blockSize, blockSize);
                        ctx.fillRect((7 - i) * blockSize, j * blockSize, blockSize, blockSize);
                    }
                }
            }
            
            return canvas.toDataURL();
        }
        
        function toggleDropdown() {
            document.getElementById('userDropdown').classList.toggle('show');
        }
        
        // 点击外部关闭下拉框
        document.addEventListener('click', function(event) {
            const dropdown = document.getElementById('userDropdown');
            const button = event.target.closest('.user-button');
            if (!button && dropdown.classList.contains('show')) {
                dropdown.classList.remove('show');
            }
        });
        
        async function init() {
            try {
                const resp = await fetch('/api/me');
                const data = await resp.json();
                if (!data.authenticated) {
                    window.location.href = '/login';
                    return;
                }
                currentUser = data.user;
                document.getElementById('username').textContent = data.user.username;
                document.getElementById('userAvatar').src = generateAvatar(data.user.username);
                
                // 加载会话列表
                await loadSessions();
                
                // 加载历史记录
                if (sessionId) {
                    await loadHistory();
                }
            } catch (error) {
                window.location.href = '/login';
            }
        }
        
        async function logout() {
            try {
                await fetch('/api/logout', { method: 'POST' });
                window.location.href = '/login';
            } catch (error) {
                window.location.href = '/login';
            }
        }
        
        init();
        
        function handleKeydown(event) {
            if (event.key === 'Enter' && !event.shiftKey) {
                event.preventDefault();
                send();
            }
        }
        
        async function send() {
            const message = document.getElementById('userMessage').value.trim();
            if (!message) {
                alert('请输入问题内容！');
                document.getElementById('userMessage').focus();
                return;
            }
            
            const models = Array.from(document.querySelectorAll('.model-checkbox input:checked'))
                .map(cb => cb.value);
            
            if (models.length === 0) {
                alert('至少选择一个模型');
                return;
            }
            
            const btn = document.getElementById('sendBtn');
            btn.disabled = true;
            
            // 创建轮次容器
            const roundId = 'round-' + Date.now();
            const responseArea = document.getElementById('responseArea');
            responseArea.innerHTML += `<div id="${roundId}" style="margin-bottom: 24px;"><div style="font-size: 12px; color: var(--text-secondary); margin-bottom: 8px;">正在思考...</div></div>`;
            window.scrollTo(0, document.body.scrollHeight);
            
            const roundContainer = document.getElementById(roundId);
            const modelContents = {};  // 存储每个模型的内容
            
            try {
                // 使用流式接口
                const response = await fetch('/api/chat/stream', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        session_id: sessionId,
                        user_message: message,
                        models: models,
                        history: conversationHistory
                    })
                });
                
                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let buffer = '';
                
                const eventSources = {};  // 每个模型的内容容器
                
                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    
                    buffer += decoder.decode(value, { stream: true });
                    const lines = buffer.split('\n');
                    buffer = lines.pop() || '';
                    
                    for (const line of lines) {
                        if (line.startsWith('event: ')) {
                            const eventName = line.slice(7);
                            const nextLine = lines.shift() || '';
                            if (nextLine.startsWith('data: ')) {
                                const data = JSON.parse(nextLine.slice(6));
                                
                                if (eventName === 'done') {
                                    sessionId = data.session_id;
                                    localStorage.setItem('sessionId', sessionId);
                                } else {
                                    // 模型响应
                                    const modelKey = eventName;
                                    if (!eventSources[modelKey]) {
                                        // 创建模型容器
                                        const containerId = `model-${modelKey}-${Date.now()}`;
                                        eventSources[modelKey] = { content: '', containerId };
                                        const modelHtml = `
                                            <div class="model-response" id="${containerId}">
                                                <div class="model-name">
                                                    <span>${modelKey === 'tencent' ? '腾讯云' : '阿里云'} ${data.model_id ? `(${data.model_id})` : ''}</span>
                                                    <span class="latency">流式中...</span>
                                                </div>
                                                <div class="content"></div>
                                            </div>
                                        `;
                                        roundContainer.innerHTML += modelHtml;
                                    }
                                    
                                    if (data.chunk) {
                                        eventSources[modelKey].content += data.chunk;
                                        const contentEl = document.querySelector(`#${eventSources[modelKey].containerId} .content`);
                                        if (contentEl) {
                                            const fullContent = marked.parse(eventSources[modelKey].content);
                                            contentEl.innerHTML = fullContent;
                                            
                                            // 检查是否需要折叠（流式完成后）
                                            if (eventSources[modelKey].content.length > 20 && !contentEl.querySelector('button')) {
                                                contentEl.classList.add('collapsed');
                                                contentEl.style.maxHeight = '3em';
                                                contentEl.style.overflow = 'hidden';
                                                contentEl.style.position = 'relative';
                                                
                                                // 添加渐变遮罩
                                                const gradient = document.createElement('div');
                                                gradient.style.cssText = 'position: absolute; bottom: 0; left: 0; right: 0; height: 2em; background: linear-gradient(transparent, white);';
                                                contentEl.appendChild(gradient);
                                                
                                                // 添加展开按钮
                                                const expandBtn = document.createElement('button');
                                                expandBtn.textContent = '展开';
                                                expandBtn.style.cssText = 'position: absolute; bottom: 8px; right: 8px; padding: 4px 12px; background: var(--accent-color); color: white; border: none; border-radius: 6px; font-size: 12px; cursor: pointer; z-index: 10;';
                                                expandBtn.onclick = function() {
                                                    const isCollapsed = contentEl.classList.contains('collapsed');
                                                    if (isCollapsed) {
                                                        contentEl.classList.remove('collapsed');
                                                        contentEl.style.maxHeight = 'none';
                                                        contentEl.style.overflow = 'visible';
                                                        expandBtn.textContent = '收起';
                                                    } else {
                                                        contentEl.classList.add('collapsed');
                                                        contentEl.style.maxHeight = '3em';
                                                        contentEl.style.overflow = 'hidden';
                                                        expandBtn.textContent = '展开';
                                                    }
                                                };
                                                contentEl.appendChild(expandBtn);
                                            }
                                        }
                                        window.scrollTo(0, document.body.scrollHeight);
                                    }
                                    
                                    if (data.error) {
                                        const contentEl = document.querySelector(`#${eventSources[modelKey].containerId} .content`);
                                        if (contentEl) {
                                            contentEl.innerHTML = '❌ ' + marked.parse(data.error);
                                            contentEl.parentElement.classList.add('error');
                                        }
                                    }
                                }
                            }
                        }
                    }
                }
                
                // 更新对话历史
                conversationHistory.push({ role: "user", content: message });
                Object.values(eventSources).forEach(source => {
                    if (source.content) {
                        conversationHistory.push({ role: "assistant", content: source.content });
                    }
                });
                
                // 保留最近 20 条消息
                if (conversationHistory.length > 20) {
                    conversationHistory = conversationHistory.slice(-20);
                }
                
                // 更新轮次编号
                const roundNum = Math.ceil(conversationHistory.length / 2);
                roundContainer.querySelector('div[style*="font-size: 12px"]').textContent = `第 ${roundNum} 轮`;
                
                document.getElementById('userMessage').value = '';
            } catch (error) {
                roundContainer.innerHTML = `
                    <div class="model-response error">
                        <div class="model-name">❌ 错误</div>
                        <div class="content">${error.message}</div>
                    </div>
                `;
            } finally {
                btn.disabled = false;
            }
        }
        
        function renderResponses(responses, totalLatency) {
            const isAdmin = currentUser && currentUser.username === 'cirrus';
            
            const html = responses.map(resp => {
                const isError = !resp.success || resp.error_message;
                const content = resp.success ? resp.content : ('❌ ' + resp.error_message);
                
                // 管理员显示详细错误
                const errorDetail = isAdmin && isError ? `
                    <button class="show-error-btn" onclick="this.nextElementSibling.style.display='block'">查看详细错误</button>
                    <div class="error-detail" style="display:none">${resp.error_message || '未知错误'}</div>
                ` : '';
                
                return `
                    <div class="model-response ${isError ? 'error' : ''}">
                        <div class="model-name">
                            <span>${resp.model_name === 'tencent' ? '腾讯云' : '阿里云'} ${resp.model_id ? `(${resp.model_id})` : ''}</span>
                            <span class="latency">${resp.latency_ms}ms</span>
                        </div>
                        <div class="content">${content}</div>
                        ${errorDetail}
                    </div>
                `;
            }).join('');
            
            document.getElementById('responseArea').innerHTML = html;
        }
        
    </script>
</body>
</html>
