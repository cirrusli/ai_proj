<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 模型对比</title>
    <style>
        :root {
            --bg-color: #ffffff;
            --text-primary: #1d1d1f;
            --text-secondary: #86868b;
            --accent-color: #0071e3;
            --accent-hover: #0077ed;
            --border-color: #d2d2d7;
            --divider-color: #e8e8ed;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: var(--bg-color);
            color: var(--text-primary);
            line-height: 1.47059;
            font-weight: 400;
            letter-spacing: -0.022em;
        }
        .header {
            background: rgba(255,255,255,0.8);
            backdrop-filter: saturate(180%) blur(20px);
            border-bottom: 1px solid var(--divider-color);
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .header-content {
            max-width: 980px;
            margin: 0 auto;
            padding: 0 22px;
            height: 52px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .header h1 {
            font-size: 21px;
            font-weight: 600;
            color: var(--text-primary);
        }
        .user-menu {
            position: relative;
        }
        .user-button {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 4px;
            background: #f5f5f7;
            border-radius: 50%;
            cursor: pointer;
            transition: background 0.2s;
            border: none;
        }
        .user-button:hover {
            background: #e8e8ed;
        }
        .user-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
        }
        .user-button:hover {
            background: #e8e8ed;
        }
        .user-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: block;
        }
        .dropdown {
            position: absolute;
            top: calc(100% + 8px);
            right: 0;
            background: white;
            border-radius: 12px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.12);
            border: 1px solid var(--divider-color);
            min-width: 180px;
            padding: 8px;
            display: none;
            z-index: 1000;
        }
        .dropdown.show {
            display: block;
        }
        .dropdown-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 14px;
            color: var(--text-primary);
            text-decoration: none;
            border-radius: 8px;
            font-size: 14px;
            transition: background 0.2s;
            cursor: pointer;
            border: none;
            background: none;
            width: 100%;
            text-align: left;
        }
        .dropdown-item:hover {
            background: #f5f5f7;
        }
        .dropdown-divider {
            height: 1px;
            background: var(--divider-color);
            margin: 8px 0;
        }
        .main {
            max-width: 980px;
            margin: 0 auto;
            padding: 40px 22px 80px;
        }
        .chat-section {
            margin-bottom: 40px;
        }
        .models-selector {
            display: flex;
            gap: 12px;
            margin-bottom: 24px;
            flex-wrap: wrap;
        }
        .model-checkbox {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 14px;
            background: #f5f5f7;
            border-radius: 980px;
            font-size: 14px;
            color: var(--text-primary);
            cursor: pointer;
            transition: background 0.2s;
        }
        .model-checkbox:hover {
            background: #e8e8ed;
        }
        .model-checkbox input {
            accent-color: var(--accent-color);
        }
        .input-area {
            display: flex;
            align-items: flex-end;
            gap: 8px;
            margin-bottom: 24px;
            background: white;
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 8px;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        .input-area:focus-within {
            border-color: var(--accent-color);
            box-shadow: 0 0 0 4px rgba(0,113,227,0.1);
        }
        textarea {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 12px;
            font-size: 15px;
            line-height: 1.47059;
            resize: none;
            min-height: 40px;
            max-height: 200px;
            font-family: inherit;
            background: transparent;
        }
        textarea:focus {
            outline: none;
        }
        .send-btn {
            width: 40px;
            height: 40px;
            background: #1d1d1f;
            color: white;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: background 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }
        .send-btn:hover {
            background: #000;
        }
        .send-btn:disabled {
            background: var(--border-color);
            cursor: not-allowed;
        }
        .send-btn svg {
            width: 20px;
            height: 20px;
        }
        .response-area {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 24px;
        }
        .model-response {
            background: #fafafa;
            border-radius: 12px;
            padding: 20px;
            border: 1px solid var(--divider-color);
        }
        .model-response.error {
            border-color: #ffcccc;
            background: #fff2f2;
        }
        .model-name {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .latency {
            font-size: 12px;
            color: var(--text-secondary);
            font-weight: 400;
        }
        .content {
            line-height: 1.7;
            color: var(--text-primary);
            white-space: pre-wrap;
            font-size: 15px;
        }
        .error-detail {
            margin-top: 10px;
            padding: 10px;
            background: #fff;
            border: 1px solid #ffcccc;
            border-radius: 6px;
            font-size: 12px;
            font-family: monospace;
            color: #d70015;
            white-space: pre-wrap;
            word-break: break-all;
        }
        .show-error-btn {
            margin-top: 8px;
            padding: 6px 12px;
            background: #d70015;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 12px;
            cursor: pointer;
        }
        .show-error-btn:hover {
            background: #b00012;
        }
        .loading {
            text-align: center;
            padding: 48px 24px;
            color: var(--text-secondary);
        }
        .spinner {
            border: 3px solid var(--divider-color);
            border-top-color: var(--accent-color);
            border-radius: 50%;
            width: 32px;
            height: 32px;
            animation: spin 1s linear infinite;
            margin: 0 auto 16px;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="header-content">
            <h1>AI 模型对比</h1>
            <div class="user-menu">
                <button class="user-button" onclick="toggleDropdown()" title="用户菜单">
                    <img id="userAvatar" class="user-avatar" alt="头像">
                </button>
                <div id="userDropdown" class="dropdown">
                    <div style="padding: 12px 14px; border-bottom: 1px solid var(--divider-color);">
                        <div style="font-weight: 600; font-size: 14px;" id="username">加载中...</div>
                        <div style="font-size: 12px; color: var(--text-secondary);" id="userRole">用户</div>
                    </div>
                    <a href="/profile" class="dropdown-item">
                        <span>👤</span> 个人主页
                    </a>
                    <a href="/settings" class="dropdown-item">
                        <span>⚙️</span> 设置
                    </a>
                    <div class="dropdown-divider"></div>
                    <button onclick="logout()" class="dropdown-item">
                        <span>🚪</span> 退出
                    </button>
                </div>
            </div>
        </div>
    </header>

    <main class="main">
        <section class="chat-section">
            <div class="models-selector">
                <label class="model-checkbox">
                    <input type="checkbox" value="tencent" checked> ☁️ 腾讯云
                </label>
                <label class="model-checkbox">
                    <input type="checkbox" value="aliyun" checked> 🔶 阿里云
                </label>
            </div>
            
            <div class="input-area">
                <textarea id="userMessage" placeholder="输入你的问题..." rows="1" onkeydown="handleKeydown(event)"></textarea>
                <button id="sendBtn" class="send-btn" onclick="send()" title="发送">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M12 19V5M5 12l7-7 7 7"/>
                    </svg>
                </button>
            </div>
        </section>
        
        <div id="responseArea" class="response-area"></div>
    </main>

    <script>
        let sessionId = localStorage.getItem('sessionId') || null;
        let currentUser = null;
        let conversationHistory = [];  // 多轮对话历史
        
        // 生成头像
        function generateAvatar(seed, size = 24) {
            const canvas = document.createElement('canvas');
            canvas.width = size;
            canvas.height = size;
            const ctx = canvas.getContext('2d');
            
            let hash = 0;
            for (let i = 0; i < seed.length; i++) {
                hash = seed.charCodeAt(i) + ((hash << 5) - hash);
            }
            const hue = hash % 360;
            const color = `hsl(${hue}, 60%, 50%)`;
            const bgColor = `hsl(${hue}, 60%, 95%)`;
            
            ctx.fillStyle = bgColor;
            ctx.fillRect(0, 0, size, size);
            
            const blockSize = size / 8;
            ctx.fillStyle = color;
            
            for (let i = 0; i < 8; i++) {
                for (let j = 0; j < 8; j++) {
                    if ((hash >> (i * 8 + j)) & 1) {
                        ctx.fillRect(i * blockSize, j * blockSize, blockSize, blockSize);
                        ctx.fillRect((7 - i) * blockSize, j * blockSize, blockSize, blockSize);
                    }
                }
            }
            
            return canvas.toDataURL();
        }
        
        function toggleDropdown() {
            document.getElementById('userDropdown').classList.toggle('show');
        }
        
        // 点击外部关闭下拉框
        document.addEventListener('click', function(event) {
            const dropdown = document.getElementById('userDropdown');
            const button = event.target.closest('.user-button');
            if (!button && dropdown.classList.contains('show')) {
                dropdown.classList.remove('show');
            }
        });
        
        async function init() {
            try {
                const resp = await fetch('/api/me');
                const data = await resp.json();
                if (!data.authenticated) {
                    window.location.href = '/login';
                    return;
                }
                currentUser = data.user;
                document.getElementById('username').textContent = data.user.username;
                document.getElementById('userAvatar').src = generateAvatar(data.user.username);
            } catch (error) {
                window.location.href = '/login';
            }
        }
        
        async function logout() {
            try {
                await fetch('/api/logout', { method: 'POST' });
                window.location.href = '/login';
            } catch (error) {
                window.location.href = '/login';
            }
        }
        
        init();
        
        function handleKeydown(event) {
            if (event.key === 'Enter' && !event.shiftKey) {
                event.preventDefault();
                send();
            }
        }
        
        async function send() {
            const message = document.getElementById('userMessage').value.trim();
            if (!message) {
                alert('请输入问题内容！');
                document.getElementById('userMessage').focus();
                return;
            }
            
            const models = Array.from(document.querySelectorAll('.model-checkbox input:checked'))
                .map(cb => cb.value);
            
            if (models.length === 0) {
                alert('至少选择一个模型');
                return;
            }
            
            const btn = document.getElementById('sendBtn');
            btn.disabled = true;
            
            document.getElementById('responseArea').innerHTML = `
                <div class="loading">
                    <div class="spinner"></div>
                    <div>正在调用模型...</div>
                </div>
            `;
            
            try {
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        session_id: sessionId,
                        user_message: message,
                        models: models,
                        history: conversationHistory
                    })
                });
                
                const data = await response.json();
                sessionId = data.session_id;
                localStorage.setItem('sessionId', sessionId);
                
                // 更新对话历史
                conversationHistory.push({ role: "user", content: message });
                data.responses.forEach(resp => {
                    if (resp.success) {
                        conversationHistory.push({ role: "assistant", content: resp.content });
                    }
                });
                
                // 保留最近 20 条消息（10 轮对话）
                if (conversationHistory.length > 20) {
                    conversationHistory = conversationHistory.slice(-20);
                }
                
                renderResponses(data.responses, data.total_latency_ms);
                document.getElementById('userMessage').value = '';
            } catch (error) {
                document.getElementById('responseArea').innerHTML = `
                    <div class="model-response error">
                        <div class="model-name">❌ 错误</div>
                        <div class="content">${error.message}</div>
                    </div>
                `;
            } finally {
                btn.disabled = false;
            }
        }
        
        function renderResponses(responses, totalLatency) {
            const isAdmin = currentUser && currentUser.username === 'cirrus';
            
            const html = responses.map(resp => {
                const isError = !resp.success || resp.error_message;
                const content = resp.success ? resp.content : ('❌ ' + resp.error_message);
                
                // 管理员显示详细错误
                const errorDetail = isAdmin && isError ? `
                    <button class="show-error-btn" onclick="this.nextElementSibling.style.display='block'">查看详细错误</button>
                    <div class="error-detail" style="display:none">${resp.error_message || '未知错误'}</div>
                ` : '';
                
                return `
                    <div class="model-response ${isError ? 'error' : ''}">
                        <div class="model-name">
                            ${resp.model_name === 'tencent' ? '☁️ 腾讯云' : '🔶 阿里云'}
                            <span class="latency">${resp.latency_ms}ms</span>
                        </div>
                        <div class="content">${content}</div>
                        ${errorDetail}
                    </div>
                `;
            }).join('');
            
            document.getElementById('responseArea').innerHTML = html;
        }
        
    </script>
</body>
</html>
