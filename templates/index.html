<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 模型对比</title>
    <style>
        :root {
            --bg-color: #ffffff;
            --text-primary: #1d1d1f;
            --text-secondary: #86868b;
            --accent-color: #0071e3;
            --accent-hover: #0077ed;
            --border-color: #d2d2d7;
            --divider-color: #e8e8ed;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: var(--bg-color);
            color: var(--text-primary);
            line-height: 1.47059;
            font-weight: 400;
            letter-spacing: -0.022em;
        }
        .header {
            background: rgba(255,255,255,0.8);
            backdrop-filter: saturate(180%) blur(20px);
            border-bottom: 1px solid var(--divider-color);
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .header-content {
            max-width: 980px;
            margin: 0 auto;
            padding: 0 22px;
            height: 52px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .header h1 {
            font-size: 21px;
            font-weight: 600;
            color: var(--text-primary);
        }
        .user-info {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 14px;
            color: var(--text-secondary);
        }
        .nav-links {
            display: flex;
            gap: 8px;
        }
        .nav-links a {
            color: var(--accent-color);
            text-decoration: none;
            padding: 8px 16px;
            border-radius: 980px;
            font-size: 12px;
            font-weight: 400;
            transition: background 0.2s;
        }
        .nav-links a:hover {
            background: #f5f5f7;
        }
        .main {
            max-width: 980px;
            margin: 0 auto;
            padding: 40px 22px 80px;
        }
        .chat-section {
            margin-bottom: 40px;
        }
        .models-selector {
            display: flex;
            gap: 12px;
            margin-bottom: 24px;
            flex-wrap: wrap;
        }
        .model-checkbox {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 14px;
            background: #f5f5f7;
            border-radius: 980px;
            font-size: 14px;
            color: var(--text-primary);
            cursor: pointer;
            transition: background 0.2s;
        }
        .model-checkbox:hover {
            background: #e8e8ed;
        }
        .model-checkbox input {
            accent-color: var(--accent-color);
        }
        .input-area {
            display: flex;
            gap: 12px;
            margin-bottom: 24px;
        }
        textarea {
            flex: 1;
            padding: 16px;
            border: 1px solid var(--border-color);
            border-radius: 12px;
            font-size: 17px;
            line-height: 1.47059;
            resize: vertical;
            min-height: 80px;
            font-family: inherit;
            transition: border-color 0.2s, box-shadow 0.2s;
            background: #fafafa;
        }
        textarea:focus {
            outline: none;
            border-color: var(--accent-color);
            box-shadow: 0 0 0 4px rgba(0,113,227,0.1);
            background: #fff;
        }
        .btn {
            padding: 16px 32px;
            background: var(--accent-color);
            color: #fff;
            border: none;
            border-radius: 980px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.2s;
            white-space: nowrap;
        }
        .btn:hover {
            background: var(--accent-hover);
        }
        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .response-area {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 24px;
        }
        .model-response {
            background: #fafafa;
            border-radius: 12px;
            padding: 20px;
            border: 1px solid var(--divider-color);
        }
        .model-response.error {
            border-color: #ffcccc;
            background: #fff2f2;
        }
        .model-name {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .latency {
            font-size: 12px;
            color: var(--text-secondary);
            font-weight: 400;
        }
        .content {
            line-height: 1.7;
            color: var(--text-primary);
            white-space: pre-wrap;
            font-size: 15px;
        }
        .error-detail {
            margin-top: 10px;
            padding: 10px;
            background: #fff;
            border: 1px solid #ffcccc;
            border-radius: 6px;
            font-size: 12px;
            font-family: monospace;
            color: #d70015;
            white-space: pre-wrap;
            word-break: break-all;
        }
        .show-error-btn {
            margin-top: 8px;
            padding: 6px 12px;
            background: #d70015;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 12px;
            cursor: pointer;
        }
        .show-error-btn:hover {
            background: #b00012;
        }
        .loading {
            text-align: center;
            padding: 48px 24px;
            color: var(--text-secondary);
        }
        .spinner {
            border: 3px solid var(--divider-color);
            border-top-color: var(--accent-color);
            border-radius: 50%;
            width: 32px;
            height: 32px;
            animation: spin 1s linear infinite;
            margin: 0 auto 16px;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="header-content">
            <h1>AI 模型对比</h1>
            <div style="display: flex; align-items: center; gap: 16px;">
                <div class="user-info" style="cursor: pointer;" onclick="window.location.href='/profile'">
                    <span>👤 <span id="username">加载中...</span></span>
                </div>
                <nav class="nav-links">
                    <a href="/settings">设置</a>
                    <a href="#" onclick="logout()">退出</a>
                </nav>
            </div>
        </div>
    </header>

    <main class="main">
        <section class="chat-section">
            <div class="models-selector">
                <label class="model-checkbox">
                    <input type="checkbox" value="tencent" checked> ☁️ 腾讯云
                </label>
                <label class="model-checkbox">
                    <input type="checkbox" value="aliyun" checked> 🔶 阿里云
                </label>
            </div>
            
            <div class="input-area">
                <textarea id="userMessage" placeholder="输入你的问题..." rows="3"></textarea>
                <button id="sendBtn" class="btn" onclick="send()">发送</button>
            </div>
        </section>
        
        <div id="responseArea" class="response-area"></div>
    </main>

    <script>
        let sessionId = localStorage.getItem('sessionId') || null;
        let currentUser = null;
        
        async function init() {
            try {
                const resp = await fetch('/api/me');
                const data = await resp.json();
                if (!data.authenticated) {
                    window.location.href = '/login';
                    return;
                }
                currentUser = data.user;
                document.getElementById('username').textContent = data.user.username;
            } catch (error) {
                window.location.href = '/login';
            }
        }
        
        async function logout() {
            try {
                await fetch('/api/logout', { method: 'POST' });
                window.location.href = '/login';
            } catch (error) {
                window.location.href = '/login';
            }
        }
        
        init();
        
        async function send() {
            const message = document.getElementById('userMessage').value.trim();
            if (!message) {
                alert('请输入问题内容！');
                document.getElementById('userMessage').focus();
                return;
            }
            
            const models = Array.from(document.querySelectorAll('.model-checkbox input:checked'))
                .map(cb => cb.value);
            
            if (models.length === 0) {
                alert('至少选择一个模型');
                return;
            }
            
            const btn = document.getElementById('sendBtn');
            btn.disabled = true;
            btn.textContent = '思考中...';
            
            document.getElementById('responseArea').innerHTML = `
                <div class="loading">
                    <div class="spinner"></div>
                    <div>正在调用模型...</div>
                </div>
            `;
            
            try {
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        session_id: sessionId,
                        user_message: message,
                        models: models
                    })
                });
                
                const data = await response.json();
                sessionId = data.session_id;
                localStorage.setItem('sessionId', sessionId);
                
                renderResponses(data.responses, data.total_latency_ms);
                document.getElementById('userMessage').value = '';
            } catch (error) {
                document.getElementById('responseArea').innerHTML = `
                    <div class="model-response error">
                        <div class="model-name">❌ 错误</div>
                        <div class="content">${error.message}</div>
                    </div>
                `;
            } finally {
                btn.disabled = false;
                btn.textContent = '发送';
            }
        }
        
        function renderResponses(responses, totalLatency) {
            const isAdmin = currentUser && currentUser.username === 'cirrus';
            
            const html = responses.map(resp => {
                const isError = !resp.success || resp.error_message;
                const content = resp.success ? resp.content : ('❌ ' + resp.error_message);
                
                // 管理员显示详细错误
                const errorDetail = isAdmin && isError ? `
                    <button class="show-error-btn" onclick="this.nextElementSibling.style.display='block'">查看详细错误</button>
                    <div class="error-detail" style="display:none">${resp.error_message || '未知错误'}</div>
                ` : '';
                
                return `
                    <div class="model-response ${isError ? 'error' : ''}">
                        <div class="model-name">
                            ${resp.model_name === 'tencent' ? '☁️ 腾讯云' : '🔶 阿里云'}
                            <span class="latency">${resp.latency_ms}ms</span>
                        </div>
                        <div class="content">${content}</div>
                        ${errorDetail}
                    </div>
                `;
            }).join('');
            
            document.getElementById('responseArea').innerHTML = html;
        }
        
        document.getElementById('userMessage').addEventListener('keypress', function(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                send();
            }
        });
    </script>
</body>
</html>
